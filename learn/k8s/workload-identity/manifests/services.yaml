# 内部向けの安定した入口。外部公開は Ingress に任せるので ClusterIP。
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: workload-identity
spec:
  selector:
    app: api
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: front
  namespace: workload-identity
spec:
  selector:
    app: front
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
