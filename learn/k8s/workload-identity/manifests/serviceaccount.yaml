# Workload Identity の「k8s 側の主体」。
# annotation の client-id で、この SA を使う Pod が「どの Managed Identity になりすますか」を指定する。__UAMI_CLIENT_ID__ は apply スクリプトが Bicep 出力で置換する。
#
# 三者の紐付け:
#   この ServiceAccount  ←(FIC の subject で信頼)→  UAMI  ←(PG の Entra 管理者)→  PostgreSQL
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pg-accessor
  namespace: workload-identity
  annotations:
    azure.workload.identity/client-id: __UAMI_CLIENT_ID__
