# prod は API のリソース確保を増やす。ベースの api Deployment に同じ name で
# マージされ、resources だけが置き換わる (strategic merge patch)。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  template:
    spec:
      containers:
        - name: api          # この name でベースのコンテナと結合する
          resources:
            requests:
              cpu: "150m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
