# front の nginx 設定。静的ページを配信しつつ、/api を同じ名前空間の
# api Service へプロキシする。これにより `kubectl port-forward svc/front` だけで
# ブラウザから /api も叩け、Ingress なしで dev/prod を別ポートに並べて観察できる。
server {
  listen 80;

  # /api は API の ClusterIP Service (同 namespace の "api") へ転送。
  location /api {
    proxy_pass http://api:80;
  }

  # それ以外は静的ページ。
  location / {
    root /usr/share/nginx/html;
    index index.html;
  }
}
