# 内部向けの安定した入口。外部公開は Ingress に任せるので ClusterIP。
# Deployment が貼ったラベル (app: api / app: front) を selector で指す。
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: config-rollout
spec:
  selector:
    app: api
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: front
  namespace: config-rollout
spec:
  selector:
    app: front
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
