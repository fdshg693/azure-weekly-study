# クラスタ全体の玄関。application routing addon (マネージド NGINX) を使う。
# simple と同じクラスタ・同じ Ingress クラスだが、こちらは config-rollout 名前空間。
# /api は API の Service へ、それ以外はフロントの Service へルーティングする。
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app
  namespace: config-rollout
spec:
  ingressClassName: webapprouting.kubernetes.azure.com
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: front
                port:
                  number: 80
