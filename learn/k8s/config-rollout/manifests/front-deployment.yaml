# フロントの Deployment。API とほぼ同じ骨格で image / name / port が違うだけ。
# こちらは v1 固定 (ロールアウトの主役は API)。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: front
  namespace: config-rollout
spec:
  replicas: 1
  selector:
    matchLabels:
      app: front
  template:
    metadata:
      labels:
        app: front
    spec:
      containers:
        - name: front
          image: __ACR_LOGIN_SERVER__/config/front:v1
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "200m", memory: "128Mi" }
