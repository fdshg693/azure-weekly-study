# 負荷に応じて API Pod の数を自動増減する。
# CPU 使用率を見るための metrics-server は AKS では既定で有効なので追加設定は不要。
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api               # ステップ4 の API Deployment を対象に
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
