<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>メッセージアプリ (V2)</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- ログイン/サインアップ画面：V2 は email + password 認証 -->
    <section id="login-view" class="view">
      <div class="login-box">
        <h1>メッセージアプリ</h1>
        <div class="tabs">
          <button id="tab-login" class="tab active" type="button">ログイン</button>
          <button id="tab-signup" class="tab" type="button">サインアップ</button>
        </div>

        <!-- ログイン -->
        <form id="login-form" class="auth-form">
          <input id="login-email" type="email" placeholder="メールアドレス" autocomplete="username" />
          <input id="login-password" type="password" placeholder="パスワード" autocomplete="current-password" />
          <button type="submit">ログイン</button>
        </form>

        <!-- サインアップ -->
        <form id="signup-form" class="auth-form hidden">
          <input id="signup-email" type="email" placeholder="メールアドレス" autocomplete="email" />
          <input id="signup-username" type="text" placeholder="ユーザー名" autocomplete="off" />
          <input id="signup-password" type="password" placeholder="パスワード" autocomplete="new-password" />
          <button type="submit">登録</button>
        </form>

        <p id="auth-message" class="auth-message"></p>
      </div>
    </section>

    <!-- メイン画面：左にユーザー/友達、右に会話 -->
    <section id="main-view" class="view hidden">
      <header class="topbar">
        <span>ログイン中: <strong id="me"></strong></span>
        <button id="logout-btn" class="ghost">ログアウト</button>
      </header>
      <div class="layout">
        <aside class="sidebar">
          <!-- 友達リスト（V2 追加） -->
          <div class="sidebar-head">
            <h2>友達</h2>
            <button id="refresh-friends" class="ghost small" title="一覧を再取得">⟳</button>
          </div>
          <ul id="friend-list"></ul>
          <p id="friends-cache" class="cache-badge"></p>

          <!-- 全ユーザー（友達追加もここから） -->
          <div class="sidebar-head">
            <h2>ユーザー</h2>
            <button id="refresh-users" class="ghost small" title="一覧を再取得">⟳</button>
          </div>
          <ul id="user-list"></ul>
          <p id="users-cache" class="cache-badge"></p>
        </aside>
        <main class="chat">
          <div class="chat-head">
            <h2 id="chat-with">相手を選択</h2>
            <button id="refresh-conv" class="ghost small" title="会話を再取得">⟳ リロード</button>
          </div>
          <div id="messages" class="messages"></div>
          <p id="conv-cache" class="cache-badge"></p>
          <form id="send-form" class="send-form hidden">
            <input id="message-input" type="text" placeholder="メッセージを入力" autocomplete="off" />
            <button type="submit">送信</button>
          </form>
        </main>
      </div>
    </section>

    <script src="app.js"></script>
  </body>
</html>
